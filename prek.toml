#:schema https://www.schemastore.org/prek.json

default_install_hook_types = ["pre-commit", "pre-push"]

[[repos]]
repo = "local"

# [[repos.hooks]]
# id = "ruff-format"
# types = ["python"]
# stages = ["pre-commit", "manual"]
# language = "script"
# require_serial = true
# entry = "ruff format --fix"

[[repos.hooks]]
id = "run-ruff"
name = "Run Ruff"
types = ["python"]
stages = ["pre-commit", "manual"]
language = "script"
require_serial = true
entry = "kausal_common/development/git-hooks/ruff-pre-commit.sh"

[[repos.hooks]]
id = "run-pyproject-fmt"
name = "Run Pyproject Fmt"
types = ["toml"]
files = "^pyproject\\.toml$"
stages = ["pre-commit", "manual"]
language = "system"
pass_filenames = true
entry = "uv tool run pyproject-fmt"

