name: Admin E2E Tests

on:
  workflow_call:
    inputs:
      backend_image:
        description: 'Backend Docker image (full path with tag)'
        required: true
        type: string
      build_id:
        description: 'Unique ID for the build'
        required: true
        type: string
      s3_endpoint:
        description: 'S3 endpoint URL where to upload test artifacts'
        required: false
        type: string
      s3_bucket:
        description: 'S3 bucket'
        required: false
        type: string

    secrets:
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      CODECOV_TOKEN:
        required: false

    outputs:
      test_report_url:
        description: 'URL to E2E test report'
        value: ${{ jobs.run-e2e-tests.outputs.test_report_url }}

env:
  POSTGRES_PASSWORD: abcd
  POSTGRES_USER: app
  POSTGRES_DATABASE: app

jobs:
  run-e2e-tests:
    name: Run admin E2E tests
    runs-on: runner-prod

    outputs:
      test_report_url: ${{ steps.upload.outputs.test_report_url }}
      coverage_uploaded: ${{ steps.upload-coverage.outcome == 'success' }}

    services:
      postgres:
        image: postgis/postgis:18-3.6-alpine
        env:
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_DATABASE: ${{ env.POSTGRES_DATABASE }}

      redis:
        image: redis:7-alpine

      backend:
        image: ${{ inputs.backend_image }}
        env:
          DATABASE_URL: postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DATABASE }}
          DEPLOYMENT_TYPE: ci
          REDIS_URL: redis://localhost
          DB_ENDPOINT: localhost:5432
          ALLOWED_HOSTS: localhost
          KUBERNETES_LOGGING: 1
          TEST_MODE: 1
          ENABLE_TEST_MODE: 1
          CI: 1
          SECRET_KEY: abcd
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}
          TEST_DB_FILE: e2e-test-database.sql.gz
          TEST_DB_S3_BUCKET: ${{ inputs.s3_bucket }}
          TEST_DB_S3_ENDPOINT: ${{ inputs.s3_endpoint }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    container:
      image: harbor.kausal.tech/library/playwright:v1.58.2

    env:
      CI: "1"
      TEST_BASE_URL: http://localhost:8000

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Wait for backend
        run: wait-for-it.sh -t 180 localhost:8000

      - name: Install Playwright dependencies
        run: corepack enable pnpm && pnpm install --prod --frozen-lockfile
        working-directory: ./e2e-tests

      - name: Start coverage tracking
        continue-on-error: true
        id: start-coverage
        run: |
          set -x
          START_COVERAGE_QUERY='mutation { testMode { startCoverageTracking } }'
          mkdir -p ${{ runner.temp }}
          start_coverage_fn=${{ runner.temp }}/start-coverage-result.json
          curl -s -X POST -H "Content-Type: application/json" \
            -d "{\"query\": \"$START_COVERAGE_QUERY\"}" \
            http://localhost:8000/v1/graphql/ > $start_coverage_fn
          START_RESULT=$(jq -r '.data.testMode.startCoverageTracking' $start_coverage_fn)
          if [ "$START_RESULT" = "true" ]; then
            echo "Coverage tracking started successfully"
          else
            echo "Failed to start coverage tracking"
            exit 1
          fi
        shell: bash

      - name: Run Playwright tests
        id: playwright_test
        run: node_modules/.bin/playwright test --reporter=html,json
        working-directory: ./e2e-tests
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results.json

      - name: Stop coverage tracking and collect data
        if: always() && !cancelled() && steps.start-coverage.outcome == 'success'
        run: |
          mkdir -p coverage-data
          STOP_COVERAGE_QUERY='mutation { testMode { stopCoverageTracking { xml } } }'
          curl -s -X POST -H "Content-Type: application/json" \
            -d "{\"query\": \"$STOP_COVERAGE_QUERY\"}" \
            http://localhost:8000/v1/graphql/ > ${{ runner.temp }}/stop-coverage-result.json
          jq -r '.data.testMode.stopCoverageTracking.xml' ${{ runner.temp }}/stop-coverage-result.json > coverage-data/coverage.xml
        working-directory: ./e2e-tests
        shell: bash

      - name: Upload test report to S3
        id: upload
        if: always()
        run: |
          S3_ENDPOINT="${{ inputs.s3_endpoint || vars.BUILD_S3_ENDPOINT }}"
          S3_BUCKET="${{ inputs.s3_bucket || vars.BUILD_S3_BUCKET }}"
          s3cmd --host "${S3_ENDPOINT}" --host-bucket "${S3_ENDPOINT}" \
            put --no-mime-magic --guess-mime-type --recursive playwright-report \
              "s3://${S3_BUCKET}/${{ inputs.build_id }}/"
          TEST_REPORT_URL="https://${S3_ENDPOINT}/${S3_BUCKET}/${{ inputs.build_id }}/playwright-report/index.html"
          echo "test_report_url=${TEST_REPORT_URL}" >> $GITHUB_OUTPUT
          test_report="🔗 [Test report](${TEST_REPORT_URL})"
          if [ "${{ steps.playwright_test.outcome == 'success' }}" = "true" ] ; then
            echo "✅ Admin E2E tests succeeded. $test_report" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Admin E2E tests failed. $test_report" >> $GITHUB_STEP_SUMMARY
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        working-directory: ./e2e-tests
        shell: bash

      - uses: daun/playwright-report-summary@v3
        if: always()
        with:
          report-file: ./e2e-tests/test-results.json
          report-url: ${{ steps.upload.outputs.test_report_url }}

      - name: Upload coverage report as artifact
        if: always() && !cancelled()
        id: upload-coverage
        uses: actions/upload-artifact@v4
        with:
          name: e2e-backend-coverage
          path: ./e2e-tests/coverage-data/coverage.xml
          retention-days: 1

  upload-coverage:
    name: Upload coverage report to Codecov
    runs-on: ubuntu-latest
    needs: run-e2e-tests
    if: always() && !cancelled() && needs.run-e2e-tests.outputs.coverage_uploaded == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: e2e-backend-coverage
          path: ./coverage-data

      - name: Upload coverage report to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-data/coverage.xml
          url: https://codecoverage.kausal.dev
          flags: e2e-tests
          recurse_submodules: true
