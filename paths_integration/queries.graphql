query NodeValues($lang: String!, $instanceId: ID!, $nodeId: ID!) @instance(identifier: $instanceId) @locale(lang: $lang){
  instance {
    id
    name
  }
  node(id: $nodeId) {
    id
    name
    metricDim {
      id
      unit {
        short
      }
      dimensions {
        id
        label
        categories {
          id
          label
        }
      }
      years
      values
      forecastFrom
    }
  }
}
