fragment OpInfo on OperationInfo {
  messages {
    kind
    message
    field
    code
  }
}

query MCPUserDetails {
  me {
    id
    uuid
    email
    firstName
    lastName
    isSuperuser
  }
}

fragment PlanConcise on Plan {
  id
  identifier
  name
  shortName
  versionName
  primaryLanguage
  otherLanguages
  publishedAt
  viewUrl
  organization {
    id
    name
  }
}

query MCPListPlans {
  plans {
    ... PlanConcise
  }
}

query MCPListActions(
  $plan: ID!
  $category: ID
  $first: Int
  $orderBy: String
) @context(input: {identifier: $plan}) {
  planActions(
    plan: $plan
    category: $category
    first: $first
    orderBy: $orderBy
  ) {
    id
    identifier
    name
    officialName
    completion
    scheduleContinuous
    startDate
    endDate
    updatedAt

    # Status information
    status {
      id
      identifier
      name
      isCompleted
    }
    implementationPhase {
      id
      identifier
      name
    }
    statusSummary {
      identifier
      label
      sentiment
      isActive
      isCompleted
    }

    # Organization info
    responsibleParties {
      id
      organization {
        ... OrganizationBrief
      }
    }
    primaryOrg {
      ... OrganizationBrief
    }

    # Categories (for filtering/grouping)
    categories {
      id
      identifier
      name
      type {
        id
        identifier
        name
      }
    }
  }
}

fragment PlanDetails on Plan {
  id
  identifier
  name
  shortName
  versionName
  primaryLanguage
  otherLanguages
  publishedAt
  viewUrl
  accessibilityStatementUrl
  externalFeedbackUrl

  # Plan features configuration
  features {
    publicContactPersons
    hasActionIdentifiers
    hasActionOfficialName
    hasActionLeadParagraph
    hasActionPrimaryOrgs
    enableSearch
    enableIndicatorComparison
    minimalStatuses
    contactPersonsPublicData
  }

  # Category types (organizational structure)
  categoryTypes {
    id
    identifier
    name
    usableForActions
    usableForIndicators
  }

  # Action status summaries (dashboard statistics)
  actionStatusSummaries {
    identifier
    label
    isActive
    isCompleted
    sentiment
  }

  # Attribute types (dynamic attributes schema)
  actionAttributeTypes {
    id
    identifier
    name
    format
    unit {
      id
      shortName
    }
    choiceOptions {
      id
      identifier
      name
    }
  }
}

query MCPGetPlan($identifier: ID!) @context(input: {identifier: $identifier}) {
  plan(id: $identifier) {
    ... PlanDetails
  }
}

fragment OrganizationBrief on Organization {
  id
  name
  abbreviation
  parent {
    id
  }
}

query MCPListOrganizations(
  $plan: ID,
  $parent: ID,
  $depth: Int,
  $contains: String
) {
  admin {
    organizations(plan: $plan, parent: $parent, depth: $depth, contains: $contains) {
      ... OrganizationBrief
    }
  }
}

mutation MCPCreateOrganization($input: OrganizationInput!) {
  organization {
    createOrganization(input: $input) {
      ... OrganizationBrief
    }
  }
}

mutation MCPCreatePlan($input: PlanInput!) {
  plan {
    createPlan(input: $input) {
      ... PlanDetails
      ... OpInfo
    }
  }
}

mutation MCPAddRelatedOrganization($input: AddRelatedOrganizationInput!) {
  plan {
    addRelatedOrganization(input: $input) {
      ... PlanConcise
      ... OpInfo
    }
  }
}

mutation MCPDeletePlan($id: ID!) {
  plan {
    deletePlan(id: $id) {
      ... OpInfo
    }
  }
}

mutation MCPCreateAction($input: ActionInput!) {
  action {
    createAction(input: $input) {
      ... ActionDetails
      ... OpInfo
    }
  }
}

mutation MCPUpdateActions($planId: ID!, $actions: [ActionUpdateInput!]!) {
  action {
    updateActions(planId: $planId, actions: $actions) {
      ... on BulkUpdateActionsResult {
        count
        ids
      }
      ... OpInfo
    }
  }
}

mutation MCPUpdateAction($planId: ID!, $input: ActionUpdateInput!) {
  action {
    updateAction(planId: $planId, input: $input) {
      ... ActionDetails
      ... OpInfo
    }
  }
}

fragment CategoryLevelDetails on CategoryLevel {
  id
  name
  namePlural
  order
}

fragment CategoryTypeDetails on CategoryType {
  id
  identifier
  name
  usableForActions
  usableForIndicators
  selectionType
  hideCategoryIdentifiers
  editableForActions
  editableForIndicators
  attributeTypes {
    ... AttributeTypeDetails
  }
  categories {
    ... CategoryDetails
  }
  levels {
    ... CategoryLevelDetails
  }
  leadParagraph
  helpText
}

mutation MCPCreateCategoryType($input: CategoryTypeInput!) {
  plan {
    createCategoryType(input: $input) {
      ... CategoryTypeDetails
      ... OpInfo
    }
  }
}

fragment CategoryDetails on Category {
  id
  identifier
  name
  parent {
    id
  }
  order
}


mutation MCPCreateCategory($input: CategoryInput!) {
  plan {
    createCategory(input: $input) {
      ... CategoryDetails
      ... OpInfo
    }
  }
}

fragment AttributeTypeDetails on AttributeType {
  id
  identifier
  name
  format
  helpText
  unit {
    id
    shortName
  }
  choiceOptions {
    id
    identifier
    name
  }
}

mutation MCPCreateAttributeType($input: AttributeTypeInput!) {
  plan {
    createAttributeType(input: $input) {
      ... AttributeTypeDetails
      ... OpInfo
    }
  }
}

fragment ActionDetails on Action {
  # Core identifiers
  id
  uuid
  identifier
  name
  officialName

  # Content
  leadParagraph
  description

  # Scheduling
  startDate
  endDate
  scheduleContinuous
  dateFormat
  updatedAt

  # Status & Progress
  completion
  manualStatusReason
  status {
    id
    identifier
    name
    isCompleted
  }
  implementationPhase {
    id
    identifier
    name
  }
  statusSummary {
    identifier
    label
    sentiment
    isActive
    isCompleted
  }
  timeliness {
    identifier
    comparison
    days
  }
  color

  # Impact
  impact {
    id
    identifier
    name
  }

  # Organizations
  primaryOrg {
    id
    name
    abbreviation
  }
  responsibleParties {
    id
    role
    specifier
    organization {
      id
      name
      abbreviation
    }
  }

  # Categories
  categories {
    id
    identifier
    name
    type {
      id
      identifier
      name
    }
  }

  # Contact Persons
  contactPersons {
    id
    role
    primaryContact
    person {
      id
      firstName
      lastName
      title
      email
      organization {
        id
        name
        abbreviation
      }
    }
  }

  # Tasks
  tasks {
    id
    name
    state
    dueAt
    completedAt
    details
  }

  # Indicators
  relatedIndicators {
    id
    effectType
    indicatesActionProgress
    indicator {
      id
      identifier
      name
      unit {
        id
        name
        shortName
      }
      latestValue {
        id
        date
        value
      }
    }
  }

  # Links
  links {
    id
    url
    title
  }

  # Status Updates
  statusUpdates {
    id
    title
    date
    content
    author {
      id
      firstName
      lastName
    }
  }

  # Related Actions
  relatedActions {
    id
    identifier
    name
  }
  mergedWith {
    id
    identifier
    name
  }
  mergedActions {
    id
    identifier
    name
  }
  supersededBy {
    id
    identifier
    name
  }
  supersededActions {
    id
    identifier
    name
  }

  # Dependencies
  allDependencyRelationships {
    preceding {
      id
      identifier
      name
    }
    dependent {
      id
      identifier
      name
    }
  }

  # Attributes (dynamic fields)
  attributes {
    __typename
    type {
      identifier
      name
      unit {
        shortName
      }
    }
    keyIdentifier
    ... on AttributeText {
      textValue: value
    }
    ... on AttributeRichText {
      richTextValue: value
    }
    ... on AttributeCategoryChoice {
      categories {
        identifier
        type {
          identifier
        }
      }
    }
    ... on AttributeNumericValue {
      numericValue: value
    }
    ... on AttributeChoice {
      choice {
        identifier
      }
    }
  }
  # Metadata
  visibility
  order
  viewUrl
}

query MCPGetActions($ids: [ID!]!) {
  admin {
    actions(ids: $ids) {
      ... ActionDetails
    }
  }
}
