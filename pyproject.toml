[build-system]
requires = ["setuptools>=61.2"]
build-backend = "setuptools.build_meta"

[project]
name = "kausal-watch"
requires-python = ">= 3.12"
dynamic = ["version"]

[tool.ruff]
line-length = 130
exclude = [
    "node_modules",
    "*/migrations",
    "Attic",
    ".venv",
]
target-version = "py312"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D1", "CPY", "Q000", "ANN204", "ERA", "ANN201", "ANN0", "PGH003", "TD0", "FIX002", "DJ001", "S101", "F401",
    "ARG001", "UP031", "G002", "BLE001", "SIM108", "SIM103", "SLF001", "C408", "RET504",
    "TRY003", "EM101", "FIX001", "UP035", "ARG002", "ARG004", "RUF012", "FBT002", "PLR2004",
    "FBT001",
]
unfixable = ["F401"]  # for now

[tool.ruff.lint.isort]
split-on-trailing-comma = true
combine-as-imports = true
required-imports = ["from __future__ import annotations"]

[tool.ruff.format]
preview = true

[tool.isort]
atomic = true
combine_as_imports = true
indent = 4
sections = ['FUTURE', 'STDLIB', 'DJANGO', 'THIRDPARTY', 'FIRSTPARTY', 'LOCALFOLDER']
known_django = [
    'django', 'rest_framework', 'graphene', 'graphql', 'graphene_django', 'modelcluster', 'modeltrans', 'wagtail'
]
line_length = 80
multi_line_output = 5
skip = "migrations"
wrap_length = 80

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "aplans.settings"
norecursedirs = [
    ".*", "node_modules", "data", ".git", "venv", "Attic", ".direnv", ".mypy_cache",
    "**/static", "**/templates", "**/media",
]
filterwarnings = [
    "ignore::DeprecationWarning:easy_thumbnails",
]
testpaths = [
    "**/tests"
]

[tool.mypy]
plugins = [
    "mypy_django_plugin.main",
]
mypy_path = "$MYPY_CONFIG_FILE_DIR/kausal_common/typings"
exclude = [
    '^Attic/',
    '^typings/',
    '^local_settings\.py',
    '^kausal_common/typings/',
]
check_untyped_defs = true
sqlite_cache = true
enable_incomplete_feature = ['NewGenericSyntax']


[[tool.mypy.overrides]]
module = [
    "colored.*", "dvc_pandas.*", "factory.*", "pint.*", "pint_pandas.*", "oauth2_provider.*", "modelcluster.*",
    "modeltrans.*", "wagtail.*", "networkx.*", "plotext.*", "graphene_django.*", "grapple.*", "willow.*",
    "reversion.*", "wagtail_modeladmin.*", "rest_framework_nested.*", "dal_admin_filters.*", "social_core.*",
    "taggit.*", "dal.*", "social_django.*", "easy_thumbnails.*", "graphene_django_optimizer.*", "environ.*",
    "storages.*",
]
ignore_missing_imports = true

[tool.django-stubs]
django_settings_module = "aplans.settings"

[tool.setuptools]
include-package-data = false

[tool.setuptools.dynamic]
dependencies = {file = ["requirements.txt", "kausal_common/requirements-common.txt"]}
optional-dependencies.dev = { file = ["requirements-dev.txt", "requirements-lint.txt"] }
optional-dependencies.lint = { file = ["requirements-lint.txt"] }
optional-dependencies.prod = { file = ["requirements-prod.txt"] }
