[build-system]
requires = ["setuptools>=61.2"]
build-backend = "setuptools.build_meta"

[project]
name = "kausal-watch"
requires-python = ">= 3.13"
dynamic = ["version"]

[tool.ruff]
extend = "./kausal_common/configs/ruff.toml"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "aplans.settings"
norecursedirs = [
  ".*",
  ".direnv",
  ".git",
  ".mypy_cache",
  "**/media",
  "**/static",
  "**/templates",
  "Attic",
  "data",
  "node_modules",
  "venv",
]
filterwarnings = ["ignore::DeprecationWarning:easy_thumbnails"]
testpaths = ["**/tests"]
env = [
  "ENV_FILE=.env.test",
]

[tool.mypy]
plugins = [
  "mypy_django_plugin.main",
  "pydantic.mypy",
]
mypy_path = "$MYPY_CONFIG_FILE_DIR/kausal_common/typings"
exclude = [
  "/migrations/",
  "^Attic/",
  "^local_settings\\.py$",
  "^typings/",
  "^kausal_common/deployment/gunicorn\\.py$",
  "node_modules",
  #"^kausal_common/typings/",
]
check_untyped_defs = true
cache_fine_grained = true
explicit_package_bases = true
strict_optional = true
always_true = ['IS_WATCH']
always_false = ['IS_PATHS']

[[tool.mypy.overrides]]
module = [
  "anymail.*",
  "colored.*",
  "channels.*",
  "dal_admin_filters.*",
  "dal.*",
  "debug_toolbar.*",
  "django_filters.*",
  "django_filters.*",
  "dvc_pandas.*",
  "easy_thumbnails.*",
  "elasticsearch_dsl.*",
  "environ.*",
  "factory.*",
  "generic_chooser.*",
  "graphene_django_optimizer.*",
  "graphene_django.*",
  "grapple.*",
  "gunicorn.*",
  "import_export.*",
  "laces.*",
  "modelcluster.*",
  "modeltrans.*",
  "nanoid.*",
  "networkx.*",
  "oauth2_provider.*",
  "opentelemetry.*",
  "permissionedforms.*",
  "pint_pandas.*",
  "pint.*",
  "plotext.*",
  "rest_framework_nested.*",
  "reversion.*",
  "rustface.*",
  "social_core.*",
  "social_django.*",
  "storages.*",
  "taggit.*",
  "tinycss2.*",
  "traitlets.*",
  "uwsgidecorators.*",
  "viztracer.*",
  "wagtail_localize.*",
  "wagtail_modeladmin.*",
  "wagtail.*",
  "wagtailautocomplete.*",
  "wagtailgeowidget.*",
  "wagtailorderable.*",
  "willow.*",
  "xlsxwriter.*",
]
ignore_missing_imports = true

[tool.mypy-baseline]
baseline_path = ".mypy-baseline.txt"
preserve_position = false
sort_baseline = true

[tool.pyright]
exclude = [
  ".*",
  "**/__pycache__",
  "**/migrations",
  "**/node_modules",
  "Attic/",
  "local_settings.py",
]
stubPath = "kausal_common/typings"
deprecateTypingAliases = true
reportAny = false
reportAttributeAccessIssue = "error"
reportConstantRedefinition = false
reportExplicitAny = false
reportIgnoreCommentWithoutRule = false
reportImplicitOverride = false
reportImportCycles = false
reportIncompatibleMethodOverride = false
reportIncompatibleVariableOverride = false
reportMissingParameterType = false
reportMissingTypeStubs = "information"
reportPrivateImportUsage = false
reportPrivateUsage = false
reportUnannotatedClassAttribute = false
reportUninitializedInstanceVariable = false
reportUnknownArgumentType = false
reportUnknownMemberType = false
reportUnknownParameterType = false
reportUnknownVariableType = false
reportUnnecessaryComparison = "information"
reportUnnecessaryIsInstance = false
reportUnreachable = false
reportUnsafeMultipleInheritance = "information"
reportUnusedCallResult = false
defineConstant = { 'IS_PATHS' = false, 'IS_WATCH' = true }


[tool.django-stubs]
django_settings_module = "aplans.settings"

[tool.setuptools]
include-package-data = false

[tool.setuptools.dynamic]
dependencies = { file = [
  "requirements.txt",
  "kausal_common/requirements-common.txt",
] }
optional-dependencies.dev = { file = [
  "requirements-dev.txt",
  "requirements-lint.txt",
] }
optional-dependencies.lint = { file = ["requirements-lint.txt"] }
optional-dependencies.prod = { file = ["requirements-prod.txt"] }
