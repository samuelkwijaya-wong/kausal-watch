[build-system]
requires = ["setuptools>=61.2"]
build-backend = "setuptools.build_meta"

[project]
name = "kausal-watch"
requires-python = ">= 3.12"
dynamic = ["version"]

[tool.ruff]
line-length = 130
exclude = [
    "node_modules",
    "*/migrations",
    "Attic",
    ".venv",
]
target-version = "py312"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D203", "D212",
    "D1", "CPY", "Q000", "ANN204", "ERA", "ANN201", "ANN0", "PGH003", "TD0", "FIX002", "DJ001", "S101",
    "ARG001", "UP031", "G002", "BLE001", "SIM108", "SIM103", "SLF001", "C408", "RET504",
    "TRY003", "EM101", "FIX001", "UP035", "ARG002", "ARG004", "RUF012", "FBT002", "PLR2004",
    "FBT001", "TID252", "RSE102", "PIE790", "D202", "PLR1722", "SIM118", "SIM114",
    "T201", "C401", "PD011", "RUF005", "PYI021",
]

[tool.ruff.lint.per-file-ignores]
"kausal_common/typings/*" = ["D"]
"kausal_common/typings/django/*" = ["ALL"]
"**/migrations/*" = ["I002"]
"**/tests/test_*" = ["PLR0913"]

[tool.ruff.lint.isort]
split-on-trailing-comma = true
combine-as-imports = true
required-imports = ["from __future__ import annotations"]
extra-standard-library = ["typing_extensions"]
section-order = ["future", "standard-library", "django", "third-party", "kausal-common", "django-project", "first-party", "local-folder"]
#section-order = ['FUTURE', 'STDLIB', 'DJANGO', 'THIRDPARTY', 'FIRSTPARTY', 'LOCALFOLDER']


[tool.ruff.lint.isort.sections]
# sections = ['FUTURE', 'STDLIB', 'DJANGO', 'THIRDPARTY', 'FIRSTPARTY', 'LOCALFOLDER']
django = [
    'django', 'rest_framework', 'graphene', 'graphql', 'graphene_django', 'modelcluster', 'modeltrans', 'wagtail', 'reversion',
    'django_stubs_ext',
]
kausal-common = [
    'kausal_common'
]
django-project = [
    'aplans'
]


[tool.ruff.format]
quote-style = "single"

# [tool.isort]
# atomic = true
# combine_as_imports = true
# indent = 4
# sections = ['FUTURE', 'STDLIB', 'DJANGO', 'THIRDPARTY', 'FIRSTPARTY', 'LOCALFOLDER']
# known_django = [
#     'django', 'rest_framework', 'graphene', 'graphql', 'graphene_django', 'modelcluster', 'modeltrans', 'wagtail'
# ]
# known_firstparty = [
#     'kausal_common'
# ]
# line_length = 80
# multi_line_output = 5
# skip = "migrations"
# wrap_length = 80

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "aplans.settings"
norecursedirs = [
    ".*", "node_modules", "data", ".git", "venv", "Attic", ".direnv", ".mypy_cache",
    "**/static", "**/templates", "**/media",
]
filterwarnings = [
    "ignore::DeprecationWarning:easy_thumbnails",
]
testpaths = [
    "**/tests"
]

[tool.mypy]
plugins = [
    "mypy_django_plugin.main",
]
mypy_path = "$MYPY_CONFIG_FILE_DIR/kausal_common/typings"
exclude = [
    '^Attic/',
    '^typings/',
    '^local_settings\.py',
    #'^kausal_common/typings/',
    '/migrations/',
    'node_modules',
]
check_untyped_defs = true
enable_incomplete_feature = ['NewGenericSyntax']
cache_fine_grained = true
explicit_package_bases = true
strict_optional = true


[[tool.mypy.overrides]]
module = [
    "colored.*", "dvc_pandas.*", "factory.*", "pint.*", "pint_pandas.*", "oauth2_provider.*", "modelcluster.*",
    "modeltrans.*", "wagtail.*", "networkx.*", "plotext.*", "graphene_django.*", "grapple.*", "willow.*",
    "reversion.*", "wagtail_modeladmin.*", "rest_framework_nested.*", "dal_admin_filters.*", "social_core.*",
    "taggit.*", "dal.*", "social_django.*", "easy_thumbnails.*", "graphene_django_optimizer.*", "environ.*",
    "storages.*", "helusers.*", "elasticsearch_dsl.*", "generic_chooser.*", "xlsxwriter.*", "laces.*",
    "debug_toolbar.*", "django_filters.*", "permissionedforms.*", "wagtail_localize.*", "rustface.*",
    "wagtailautocomplete.*", "wagtailorderable.*", "wagtailgeowidget.*", "anymail.*", "django_filters.*",
    "tinycss2.*", "import_export.*", "nanoid.*", "uwsgidecorators.*", "opentelemetry.*"
]
ignore_missing_imports = true

[tool.mypy-baseline]
baseline_path = ".mypy-baseline.txt"
preserve_position = true

[tool.pyright]
exclude = [
    'Attic/',
    '**/__pycache__',
    'local_settings.py',
    '**/migrations',
    '**/node_modules',
    '.*',
]
stubPath = "kausal_common/typings"
deprecateTypingAliases = true
reportAttributeAccessIssue = "warning"


[tool.django-stubs]
django_settings_module = "aplans.settings"

[tool.setuptools]
include-package-data = false

[tool.setuptools.dynamic]
dependencies = {file = ["requirements.txt", "kausal_common/requirements-common.txt"]}
optional-dependencies.dev = { file = ["requirements-dev.txt", "requirements-lint.txt"] }
optional-dependencies.lint = { file = ["requirements-lint.txt"] }
optional-dependencies.prod = { file = ["requirements-prod.txt"] }
